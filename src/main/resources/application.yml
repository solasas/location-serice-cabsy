server:
  port: 8084

spring:
  application:
    name: location-service
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: location-service
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.cabsy.location.event
        spring.json.use.type.headers: false
  data:
    redis:
      host: localhost
      port: 6379

cabsy:
  kafka:
    topics:
      driver-location-updated: driver-location-updated
  redis:
    driver-locations-key: drivers:locations
